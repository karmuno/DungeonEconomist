{% extends "base.html" %}

{% block title %}Expeditions - Venturekeep{% endblock %}

{% block content %}
<div class="bg-gray-800 border border-gray-600 rounded-lg p-6">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-green-400">Expeditions</h1>
        <button class="bg-green-500 hover:bg-green-600 text-black font-semibold px-4 py-2 rounded"
                hx-get="/expeditions/create-form"
                hx-target="#modal-content"
                hx-trigger="click"
                onclick="document.getElementById('modal-title').innerText='Launch Expedition'; document.getElementById('modal').classList.remove('hidden')">
            Launch Expedition
        </button>
    </div>

    <div id="time-panel-expeditions" class="flex justify-between items-center mb-6 p-4 bg-black border border-gray-600 text-white rounded-lg">
        {% include "partials/expedition_time_controls.html" %}
    </div>
    <div id="loading-indicator" class="htmx-indicator text-center mb-4 text-gray-400"> <!-- This might be redundant if the partial's indicator works for this scope -->
        <p>Advancing time...</p>
    </div>
    
    <!-- Expedition Tabs -->
    <div class="mb-6">
        <div class="border-b border-gray-600">
            <ul class="flex -mb-px">
                <li class="mr-1">
                    <button class="inline-block py-2 px-4 text-green-400 font-medium border-b-2 border-green-400"
                            id="active-tab"
                            hx-get="/expeditions/active"
                            hx-target="#expedition-content"
                            hx-trigger="click"
                            onclick="setActiveTab('active-tab')">
                        Active
                    </button>
                </li>
                <li class="mr-1">
                    <button class="inline-block py-2 px-4 text-gray-400 hover:text-green-400 font-medium border-b-2 border-transparent"
                            id="completed-tab"
                            hx-get="/expeditions/completed"
                            hx-target="#expedition-content"
                            hx-trigger="click"
                            onclick="setActiveTab('completed-tab')">
                        Completed
                    </button>
                </li>
            </ul>
        </div>
    </div>
    
    <!-- Expedition Content will be loaded by HTMX -->
    <div id="expedition-content" class="text-gray-300">
        <!-- Default content (e.g. active expeditions) will be loaded by JS -->
        <p class="text-center p-4">Loading expedition data...</p>
    </div>
</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center hidden z-50">
    <div class="bg-black border border-green-500 p-6 rounded-lg shadow-lg w-full max-w-md">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-green-400" id="modal-title">Launch Expedition</h2>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-gray-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <div id="modal-content">
            <!-- Content will be loaded here -->
        </div>
    </div>
</div>

{% block scripts %}
<script>
    function setActiveTab(tabId) {
        const activeTab = document.getElementById('active-tab');
        const completedTab = document.getElementById('completed-tab');

        // Reset both tabs to inactive state
        [activeTab, completedTab].forEach(tab => {
            tab.classList.remove('text-green-400', 'border-green-400');
            tab.classList.add('text-gray-400', 'border-transparent', 'hover:text-green-400');
        });
        
        // Activate the selected tab
        const selectedTab = document.getElementById(tabId);
        selectedTab.classList.remove('text-gray-400', 'border-transparent', 'hover:text-green-400');
        selectedTab.classList.add('text-green-400', 'border-green-400');
    }
    
    // Load active expeditions on page load and set active tab
    document.addEventListener('DOMContentLoaded', function() {
        htmx.ajax('GET', '/expeditions/active', {target: '#expedition-content'});
        setActiveTab('active-tab'); // Ensure "Active" tab is styled as active on load
    });
</script>
{% endblock %}
{% endblock %}
