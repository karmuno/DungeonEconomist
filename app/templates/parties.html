{% extends "base.html" %}

{% block title %}Parties - Venturekeep{% endblock %}

{% block content %}
<div class="bg-gray-800 border border-gray-600 rounded-lg p-6">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-green-400">Parties</h1>
        <button class="bg-green-500 hover:bg-green-600 text-black font-semibold px-4 py-2 rounded"
                hx-get="/parties/create-form"
                hx-target="#modal-content"
                hx-trigger="click"
                onclick="document.getElementById('modal-title').innerText='Create New Party'; document.getElementById('modal').classList.remove('hidden')">
            New Party
        </button>
    </div>
    
    <!-- Party List Container - Loads partial -->
    <div id="party-list-container"
         class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
         hx-get="/adventurers/filter"
         hx-trigger="load, partyListChanged from:body"
         hx-swap="innerHTML">
        <!-- Loading placeholder -->
        <div class="col-span-full text-center p-8 text-gray-400">
            <p>Loading parties...</p>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center hidden z-50">
    <div class="bg-black border border-green-500 p-6 rounded-lg shadow-lg w-full max-w-lg"> <!-- Adjusted max-w-lg for potentially larger forms -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-green-400" id="modal-title">Party Details</h2>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-gray-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <div id="modal-content">
            <!-- Content will be loaded here by HTMX -->
        </div>
    </div>
</div>
{% endblock %}
