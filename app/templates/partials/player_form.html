<div class="bg-gray-100 p-6 rounded-lg shadow mb-6">
    <h3 class="text-xl font-bold mb-4">Create New Player</h3>
    <form hx-post="/players/" hx-swap="outerHTML" class="space-y-4">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700">Player Name</label>
            <input type="text" id="name" name="name" required 
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
        </div>
        <div class="flex justify-end">
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Create Player
            </button>
        </div>
    </form>
</div>
