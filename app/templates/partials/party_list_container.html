<!-- Party List Container -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for party in parties %}
        <!-- Include the enhanced party card partial -->
        {% include "partials/party_card_enhanced.html" %}
    {% else %}
        <div class="col-span-3 bg-gray-700 border border-gray-600 p-6 rounded-lg text-center">
            <svg class="w-16 h-16 mx-auto text-gray-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
            <p class="text-lg mb-4 text-gray-300">No parties match your criteria</p>
            <button class="bg-green-500 hover:bg-green-600 text-black font-semibold px-4 py-2 rounded"
                    hx-get="/parties/create-form"
                    hx-target="#modal-content"
                    hx-trigger="click"
                    onclick="document.getElementById('modal-title').innerText='Create New Party'; document.getElementById('modal').classList.remove('hidden')">
                Create New Party
            </button>
        </div>
    {% endfor %}
</div>
