<form hx-post="/adventurers/"
      hx-target="#adventurer-view-container"  {# Target the container that holds list/card view #}
      hx-swap="innerHTML"
      hx-on:htmx:after-request="document.getElementById('modal').classList.add('hidden'); document.body.dispatchEvent(new Event('adventurerListChanged'))"
      class="space-y-4 text-gray-300">
    <div>
        <label for="name" class="block text-sm font-medium text-gray-300">Name</label>
        <input type="text" id="name" name="name" required
               class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white focus:border-green-500 focus:ring-green-500 placeholder-gray-400">
    </div>
    
    <div>
        <label for="adventurer_class" class="block text-sm font-medium text-gray-300">Class</label>
        <select id="adventurer_class" name="adventurer_class" required
                class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white focus:border-green-500 focus:ring-green-500">
            <option value="Fighter">Fighter</option>
            <option value="Cleric">Cleric</option>
            <option value="Magic-User">Magic-User</option>
            <option value="Elf">Elf</option>
            <option value="Dwarf">Dwarf</option>
            <option value="Halfling">Halfling</option>
        </select>
    </div>
    
    <div>
        <label for="level" class="block text-sm font-medium text-gray-300">Level</label>
        <input type="number" id="level" name="level" value="1" min="1" max="10"
               class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white focus:border-green-500 focus:ring-green-500">
    </div>
    
    <div>
        <label for="hp_max" class="block text-sm font-medium text-gray-300">Hit Points</label>
        <input type="number" id="hp_max" name="hp_max" value="10" min="1"
               class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white focus:border-green-500 focus:ring-green-500">
    </div>
    
    <div class="flex justify-end pt-2">
        <button type="button" 
                class="bg-gray-600 hover:bg-gray-500 text-white px-4 py-2 rounded mr-2 font-semibold"
                onclick="document.getElementById('modal').classList.add('hidden')">
            Cancel
        </button>
        <button type="submit" 
                class="bg-green-500 hover:bg-green-600 text-black font-semibold px-4 py-2 rounded">
            Create Adventurer
        </button>
    </div>
</form>
