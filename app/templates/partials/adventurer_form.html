<form hx-post="/adventurers/" hx-target="#adventurer-list" hx-swap="outerHTML" class="space-y-4">
    <div>
        <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
        <input type="text" id="name" name="name" required
               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
    </div>
    
    <div>
        <label for="adventurer_class" class="block text-sm font-medium text-gray-700">Class</label>
        <select id="adventurer_class" name="adventurer_class" required
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
            <option value="Fighter">Fighter</option>
            <option value="Cleric">Cleric</option>
            <option value="Magic-User">Magic-User</option>
            <option value="Elf">Elf</option>
            <option value="Dwarf">Dwarf</option>
            <option value="Hobbit">Hobbit</option>
        </select>
    </div>
    
    <div>
        <label for="level" class="block text-sm font-medium text-gray-700">Level</label>
        <input type="number" id="level" name="level" value="1" min="1" max="10"
               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
    </div>
    
    <div>
        <label for="hp_max" class="block text-sm font-medium text-gray-700">Hit Points</label>
        <input type="number" id="hp_max" name="hp_max" value="10" min="1"
               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
    </div>
    
    <div class="flex justify-end">
        <button type="button" 
                class="bg-gray-500 text-white px-4 py-2 rounded mr-2 hover:bg-gray-600"
                onclick="document.getElementById('modal').classList.add('hidden')">
            Cancel
        </button>
        <button type="submit" 
                class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
            Create
        </button>
    </div>
</form>
