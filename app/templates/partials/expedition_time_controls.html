<div id="expedition-time-controls-content"> <!-- Inner wrapper -->
    <div class="flex justify-between items-center mb-1">
        <div id="current-day-display">
            <h2 class="text-xl font-semibold text-green-400">Current Day: {{ game_time.current_day if game_time else 'N/A' }}</h2>
        </div>
        <button hx-post="/time/advance-day"
                hx-target="#time-panel-expeditions" <!-- This button will cause the parent div with this ID to be replaced -->
                hx-swap="outerHTML"
                hx-indicator="#loading-indicator-expedition-time"
                class="bg-green-500 hover:bg-green-600 text-black font-semibold py-2 px-4 rounded">
            Advance Day
        </button>
    </div>
    <div id="loading-indicator-expedition-time" class="htmx-indicator text-center text-sm text-gray-400 mb-2">
        <p>Advancing...</p>
    </div>
</div>
