[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults (FastAPI Depends pattern)
    "E712",   # == True/False comparisons — intentional for SQLAlchemy filter expressions
    "SIM108", # ternary suggestions — readability preference
    "SIM116", # dict instead of if/elif — readability preference
    "UP042",  # StrEnum suggestion — keep str+Enum for broader compatibility
]

[tool.ruff.lint.isort]
known-first-party = ["app"]
